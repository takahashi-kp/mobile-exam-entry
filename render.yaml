services:
  - type: web
    name: mobile-exam-entry
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SYNC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mobile-exam-entry-db
          property: connectionString
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

databases:
  - name: mobile-exam-entry-db
    databaseName: mobile_exam_entry
    user: mobile_exam_entry
